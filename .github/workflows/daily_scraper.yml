name: 每日 ETF 持股爬蟲

on:
  # 台灣時間 17:00（UTC 09:00），週一至週五
  schedule:
    - cron: "0 9 * * 1-5"

  # 允許手動觸發（測試用）
  workflow_dispatch:

jobs:
  scrape:
    name: 抓取三支 ETF 持股資料
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scrapers/requirements.txt

      - name: 安裝相依套件
        run: pip install -r scrapers/requirements.txt

      - name: 初始化資料庫（首次執行時建表）
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: python scrapers/init_db.py

      - name: 執行持股爬蟲
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: python scrapers/scrape_holdings.py

      - name: 執行摘要
        if: always()
        run: |
          echo "台灣時間：$(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M:%S')"
          echo "執行結果：${{ job.status }}"

      - name: 失敗時建立 GitHub Issue 通知
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toLocaleDateString('zh-TW', { timeZone: 'Asia/Taipei' });
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ 爬蟲失敗：${today}`,
              body: `每日 ETF 持股爬蟲執行失敗。\n\n[查看執行記錄](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ["bug"],
            });
